version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install bandit
  build:
    commands:
      - echo "Running STRICT Security Scan (Low/Med/High)..."
      # -l (one L) tells Bandit to report ALL severity levels
      # -f screen prints the results to your AWS logs so you can show the faculty
      - bandit -r . -l
artifacts:
  files:
    - "**/*"