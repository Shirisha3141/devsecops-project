version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install bandit
  build:
    commands:
      - echo "Running Security Scan (Fails on Medium/High)..."
      # -ll (two L's) tells Bandit: "Ignore Low, but Fail on Medium or High"
      - bandit -r . -ll