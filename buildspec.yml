version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install flask bandit
  build:
    commands:
      - echo "Starting DevSecOps Security Audit..."
      # This command will fail the build if it finds any HIGH severity issue
      - bandit -r . -lll -f html -o bandit-report.html
artifacts:
  files:
    - bandit-report.html
    - secure_app/**/*