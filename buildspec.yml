version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install bandit
  build:
    commands:
      - echo "Starting Bandit SAST scan..."
      # -lll means level 3 (high)
      # -f html outputs the web report
      # -o creates the file
      - bandit -r . -lll -f html -o bandit-report.html
artifacts:
  files:
    - bandit-report.html