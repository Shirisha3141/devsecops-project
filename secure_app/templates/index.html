<div class="container mt-5">
    {% if vulnerable %}
    <div class="alert alert-danger shadow-sm mb-4" role="alert">
        <h4 class="alert-heading">⚠️ Security Breach Detected!</h4>
        <p>{{ error }}</p>
        <hr>
        <p class="mb-0 small">The DevSecOps Pipeline has flagged this build for immediate termination.</p>
    </div>
    {% endif %}

    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card p-5">
                <h3>System Status</h3>
                <hr>
                <div class="mt-3">
                    {% if vulnerable %}
                        <span class="badge bg-danger status-badge">STATUS: COMPROMISED</span>
                    {% else %}
                        <span class="badge bg-success status-badge">STATUS: ACTIVE</span>
                    {% endif %}
                </div>
                <p class="text-muted mt-4">Protected by AWS CodePipeline & Bandit SAST</p>
            </div>
        </div>
    </div>
</div>
